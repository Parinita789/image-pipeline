services:

  # MongoDB
  mongo:
    image: mongo:7
    command: ["mongod", "--quiet"]
    container_name: image-pipeline-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  # LocalStack (S3 + SQS)
  localstack:
    image: localstack/localstack:3
    container_name: image-pipeline-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # API
  api:
    build:
      context: .
      target: api
    container_name: image-pipeline-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      mongo:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  #  Worker
  worker:
    build:
      context: .
      target: worker
    container_name: image-pipeline-worker
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      mongo:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  mongo_data:
  localstack_data: