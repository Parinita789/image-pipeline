name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go vet ./...
      - name: Unit tests
        run: go test ./internal/auth/... ./internal/services/...
      - name: Integration tests
        run: go test ./internal/tests/integration/... -timeout 5m
